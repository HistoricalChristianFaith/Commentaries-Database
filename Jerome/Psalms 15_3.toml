[[commentary]]
quote='''
He who has practiced no deceit with his tongue: he who has uttered in speech what he has pondered in his mind. Nor has done evil to his neighbor. Some think that a neighbor is a brother, or a fellow townsman, or a kinsman, or a blood relation. But our Lord teaches in the Gospel in that parable, where a certain man went down from Jerusalem to Jericho: a priest passed by, a Levite passed by, and had no pity: a Samaritan passed by, and had pity. And afterward the Lord asks, and says: Which of these was a neighbor? At once it is answered: He who did well. And the Lord adds: Go and do you likewise. All men, therefore, are neighbors to us, and we ought to do evil to none. But if we understand neighbors to be brothers and kinsmen, then are we permitted to do evil to strangers? But far be it to believe so. We are all men neighbors to men: for we have one Father. And has not accepted reproach against his neighbors. A great thing is said. Never, he says, has a neighbor murmured against him; never, he says, has he found any occasion to disparage him. This virtue exceeds the human condition, it is God's grace.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_005.html'
source_title="Homily 5, on Psalm 14"
