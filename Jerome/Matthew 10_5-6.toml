[[commentary]]
quote='''
(Verses 5, 6.) Do not go into the way of the Gentiles, and do not enter into the cities of the Samaritans: but go rather to the lost sheep of the house of Israel. This place is not contrary to the commandment which is afterwards said: Going, teach all nations, baptizing them in the name of the Father, and of the Son, and of the Holy Ghost  (Matt. 28:19) . Because this is before the resurrection, and that after the resurrection is the commandment. And it was necessary to announce the first coming of Christ to the Jews, so that they would not have a just excuse for rejecting Him; because He sent the apostles to the Gentiles and to the Samaritans. But according to the tropology, those of us who are called by the name of Christ are commanded not to walk in the error of the way of the gentiles and heretics, so that as their religion is separated, let their way of life be separated as well.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title='Commentary on Matthew'

[[commentary]]
quote='''
This passage does not contradict the command which He gave afterwards, Go and teach all nations; for this was before His resurrection, that was after. And it behoved the coming of Christ to be preached to the Jews first, that they might not have any just plea, or say that they were rejected of the Lord, who sent the Apostles to the Gentiles and Samaritans.

Figuratively; Herein we who bear the name of Christ are commanded not to walk in the way of the Gentiles, or the error of the heretics, but as we are separate in religion, that we be also separate in our life.
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%252010.html'
source_title="Catena Aurea by Aquinas"
