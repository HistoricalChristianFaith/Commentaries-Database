[[commentary]]
quote='''
For the enemy has persecuted my soul. This needs no interpretation: no one doubts that it is the devil. He has humbled my life on the earth. This is what he means. Before this I had wings, and I flew: but now the enemy has persecuted me and seized me, and bound my feet and my hands; just as a bird is caught by a man, and seems as it were to be dead, because it does not have the free use of its wings to fly. So too, he says, the enemy has bound me with the awareness of my sins.

He has placed me in dark places, like the dead of the world. Like the dead of the world: not yet dead. Why? Because he stands in repentance. But if anyone who sins does not do penance, this man is dead to the world, and not like one dead, but perfectly dead. This, then, the enemy supposed—that I would not do penance for my sins, which he himself suggested to me that I should commit.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_053.html'
source_title="Homily 53, on Psalm 142"
