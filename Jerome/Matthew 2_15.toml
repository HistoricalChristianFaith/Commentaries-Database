[[commentary]]
quote='''
In this it is to be noted that wherever the Evangelist, whether on his own account or in the person of our Lord the Saviour quotes the testimony of the Old Testament he does not follow the authority of the translators of the Septuagint but the Hebrew. Wherefore these two forms exist "Out of Egypt have I called my son," and "for he shall be called a Nazarene."
'''
source_url='https://www.newadvent.org/fathers/2708.htm'
source_title="De Viris Illustribus (On Illustrious Men), Section 3"

[[commentary]]
quote='''
(Epist. 57.7.) This is not in the LXX; but in Osee according to the genuine Hebrew text we read; Israel is my child, and I have loved him, and, from Egypt have I called my Son; where the LXX render, Israel is my child, and I have loved him, and called my sons out of Egypt.

(In Osee 11:2.) The Evangelist cites this text, because it refers to Christ typically. For it is to be observed, that in this Prophet and in others, the coming of Christ and the call of the Gentiles are foreshewn in such a manner, that the thread of history is never broken.

Let those who deny the authenticity of the Hebrew copies, show us this passage in the LXX, and when they have failed to find it, we will show it them in the Hebrew. We may also explain it in another way, by considering it as quoted from Numbers, God brought him out of Egypt; his glory is as it were that of a unicorn. (Num. 23:22.)
'''
append_to_author_name=' (as quoted by Aquinas, AD 1274)'
source_url='https://historicalchristian.faith/by_father.php?file=Thomas%2520Aquinas%2FCatena%2520Aurea%2FCommentary%2520on%2520Matthew%2FChapter%25202.html'
source_title="Catena Aurea by Aquinas"
