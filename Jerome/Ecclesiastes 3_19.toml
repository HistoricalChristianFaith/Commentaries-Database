[[commentary]]
quote='''
"For the fate of men and the fate of beast - they have one and the same fate: as one dies so the other dies, and they all have the same spirit. Man has no superiority over beast, for all is futile."  Just as a beast dies, thus
man dies, and one breath is for all, and that is the air that we breathe. For he says this: "and one spirit is for
both, and there is nothing more for man than for beast."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Ecclesiastes.html'
source_title='Commentary on Ecclesiastes'
