[[commentary]]
quote='''
But Eliakim son of Hilkiah, who was in charge of the palace, went out to him, along with the royal secretary Shebna and the court official Joah son of Asaph. Eliakim is the same person mentioned in the Vision of the Valley of Zion (see Isaiah 22:20-21): I will call my servant Eliakim son of Hilkiah, and I will clothe him in your robe and fasten your sash around him. I will hand your authority over to him, and he will be like a father to the inhabitants of Jerusalem and the people of Judah, and so on.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"


[[commentary]]
quote='''
But these things are said to Shebna, who was the governor of the Temple before him, of whom it is written in the same vision: Go and enter to him who dwells in the tabernacle, to Shebna the governor of the Temple, whom the Hebrews say handed over his hands to the Assyrians, terrified by Rabsaris' threats, and betrayed the lower part of Jerusalem to the enemy, and except for the fortress of Zion and the Temple, nothing else remained that the Assyrian did not hold. Where are those who think that Sobna, who is now going out with Eliacim and Joahe to meet Rabsacen, is the same person as before. There, Sobna, the head of the Temple, is said to be captured by the Assyrians; but here Sobna is a scribe, that is, a γραμματεὶς, who is called Sopher in Hebrew, and is the same as the previous one.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
