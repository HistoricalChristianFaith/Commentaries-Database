[[commentary]]
quote='''
He did not say, if you have something against your brother, but if your brother has something against you, so that a harsher necessity of reconciliation may be imposed on you. As long as we cannot appease him, I do not know whether we should consequently offer our gifts to God.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Matthew.html'
source_title="Commentary on Matthew"
