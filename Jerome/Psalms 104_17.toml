[[commentary]]
quote='''
There the sparrows shall build their nests. By "sparrows," let us understand all birds — the whole from a part.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"


[[commentary]]
quote='''
The house of the heron is their leader. The heron is a bird of very great size: and it is said to conquer even the eagle, and to have the eagle itself as its food. And it is not like the other birds, which have fixed nests, and go to their own places at evening; but this one sleeps wherever the darkness overtakes it. But according to the figurative interpretation, the monk has no cell, but wherever he finds himself, there he stays; and his battle is with the devil who reigns in this world, just as the heron too conquers the eagle, the king of the birds, as it is written: "Though you be exalted like the eagle, from there I will drag you down, says the Lord." For the eagle is the devil, according to Ezekiel.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FHomilies%2520on%2520Psalms%2Fhomily_030.html'
source_title="Homily 30, on Psalm 103"
