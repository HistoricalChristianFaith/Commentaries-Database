[[commentary]]
quote='''
And hear these things that from the beginning were spoken in secret, that is, through the enigmas and mysteries of the Prophets, which were unknown to all previous generations. When all things were made by the Father, he was with him, who rejoiced, who even now says: I who have always been with the Father, and in the Father, and have never been without the Father, even now I speak; and according to the frailty of the assumed flesh, I say that the Lord God sent me and his spirit: and in a brief verse, the sacrament of the Trinity is revealed to us.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Jerome%2FCommentary%2520on%2520Isaiah.html'
source_title="Commentary on Isaiah"
