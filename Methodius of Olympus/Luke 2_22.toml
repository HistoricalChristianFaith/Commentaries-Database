[[commentary]]
quote='''
Hence it was that the ark of God removed from the inn at Bethlehem, for there He paid to the law that debt of the forty days, due not to justice but to grace, and rested upon the mountains of Sion, and receiving into His pure bosom as upon a lofty throne, and one transcending the nature of man, the Monarch of all, she presented Him there to God the Father, as the joint-partner of His throne and inseparable from His nature, together with that pure and undefiled flesh which he had of her substance assumed. The holy mother goes up to the temple to exhibit to the law a new and strange wonder, even that child long expected, who opened the virgin's womb, and yet did not burst the barriers of virginity; that child, superior to the law, who yet fulfilled the law; that child that was at once before the law, and yet after it; that child, in short, who was of her incarnate beyond the law of nature.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520Concerning%2520Simeon%2520and%2520Anna.html"
source_title="Methodius Oration Concerning Simeon and Anna"
