[[commentary]]
quote='''
Hence the aged Simeon, putting off the weakness of the flesh, and putting on the strength of hope, in the face of the law hastened to receive the Minister of the law, the Teacher with authority, the God of Abraham, the Protector of Isaac, the Holy One of Israel, the Instructor of Moses; Him, I say, who promised to show him His divine incarnation, as it were His hinder parts; Him who, in the midst of poverty, was rich; Him who in infancy was before the ages; Him who, though seen, was invisible; Him who in comprehension was incomprehensible; Him who, though in littleness, yet surpassed all magnitude—at one and the same time in the temple and in the highest heavens—on a royal throne, and on the chariot of the cherubim; Him who is both above and below continuously; Him who is in the form of a servant, and in the form of God the Father; a subject, and yet King of all.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520Concerning%2520Simeon%2520and%2520Anna.html"
source_title="Methodius Oration Concerning Simeon and Anna"
