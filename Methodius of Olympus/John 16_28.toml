[[commentary]]
quote='''
Ye think, indeed, under a pretence of piety, to avenge the glory of God, not understanding that he that despiseth Me despiseth My Father also. I came forth from God, and am come into the world, and My glory is the glory of My Father also.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520on%2520the%2520Psalms.html"
source_title="Methodius Oration on the Psalms"
