[[commentary]]
quote='''
For it was thence that sin took occasion to deceive me. For when the law was given, the devil had it in his power to work lust in me; "for without the law, sin was dead; " which means "when the law was not given, sin could not be committed."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FFrom%2520the%2520Discourse%2520on%2520the%2520Resurrection.html"
source_title="Methodius From the Discourse on the Resurrection"
