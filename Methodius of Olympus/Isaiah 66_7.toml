[[commentary]]
quote='''
Now that that parturition was polluted, and stood not in need of expiatory victims, Isaiah is our witness, who proclaims distinctly to the whole earth under the sun: "Before she travailed," he says, "she brought forth before her pains came, she escaped, and brought forth a man-child." Who hath heard such a thing? Who hath seen such things? The most holy virgin mother, therefore, escaped entirely the manner of women even before she brought forth: doubtless, in order that the Holy Spirit, betrothing her unto Himself, and sanctifying her, she might conceive without intercourse with man. She hath brought forth her first-born Son, even the only-begotten Son of God, Him, I say, who in the heavens above shone forth as the only-begotten, without mother, from out His Father's substance, and preserved the virginity of His natural unity undivided and inseparable; and who on earth, in the virgin's nuptial chamber, joined to Himself the nature of Adam, like a bridegroom, by an inalienable union, and preserved His mother's purity uncorrupt and uninjured—Him, in short, who in heaven was begotten without corruption, and on earth brought forth in a manner quite unspeakable.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520Concerning%2520Simeon%2520and%2520Anna.html'
source_title="ORATION CONCERNING SIMEON AND ANNA 3"
