[[commentary]]
quote='''
As also the Lord showed, when He said: "Make to yourselves friends of the mammon of unrighteousness; that, when ye fail, they may receive you into everlasting habitations." For what the Lord then called "habitations," the apostle here calls "clothing." And what He there calls "friends" "of unrighteousness," the apostle here calls "houses" "dissolved." As then, when the days of our present life shall fail, those good deeds of beneficence to which we have attained in this unrighteous life, and in this "world" which "lieth in wickedness," will receive our souls; so when this perishable life shall be dissolved, we shall have the habitation which is before the resurrection-that is, our souls shall he with God, until we shall receive the new house which is prepared for us, and which shall never fall.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FFrom%2520the%2520Discourse%2520on%2520the%2520Resurrection.html"
source_title="Methodius From the Discourse on the Resurrection"
