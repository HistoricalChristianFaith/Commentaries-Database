[[commentary]]
quote='''
But while these things were doing, and the disciples were rejoicing and praising God with a loud voice for all the mighty works that they had seen, saying, Blessed be the King that cometh in the name of the Lord; peace in heaven, and glory in the highest; the city began to inquire, saying, Who is this? stirring up its hardened and inveterate envy against the glory of the Lord. But when thou hearest me say the city, understand the ancient and disorderly multitude of the synagogue. They ungratefully and malignantly ask, Who is this? as if they had never yet seen their Benefactor, and Him whom divine miracles, beyond the power of man, had made famous and renowned; for the darkness comprehended not that unsetting light which shone in upon it.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520on%2520the%2520Psalms.html"
source_title="Methodius Oration on the Psalms"
