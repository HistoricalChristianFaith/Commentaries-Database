[[commentary]]
quote='''
But Methodius: The Holy Spirit, who of God is given to all men, and of whom Solomon said, "For Thine incorruptible Spirit is in all things," He receives for the conscience, which condemns the offending soul.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FSome%2520Other%2520Fragments%2520of%2520the%2520Same%2520Methodius.html"
source_title="Some Other Fragments of the Same Methodius"
