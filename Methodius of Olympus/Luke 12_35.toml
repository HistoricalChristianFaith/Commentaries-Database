[[commentary]]
quote='''
Just as our Lord Jesus Christ commands in the Gospels, thus directing: "Let not your lights be extinguished, and let not your loins be loosed. Therefore also be ye like men who wait for their lord, when he will return from the wedding; that, when he cometh and knocketh, they may open unto him immediately. Blessed are ye, when he shall make you sit down, and shall come and serve you. And if he come in the second, or in the third watch, ye are blessed." For consider, O virgins, when He mentions three watches of the night, and His three comings, He shadows forth in symbol our three periods of life, that of the boy, of the full-grown man, and of the old man; so that if He should come and remove us from the world while spending our first period, that is, while we are boys, He may receive us ready and pure, having nothing amiss; and the second and the third in like manner.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FDiscourse%25205.-Thallousa.html"
source_title="Methodius Discourse V. Thallousa"
