[[commentary]]
quote='''
"Wherefore the law is holy, and the commandment holy, and just and good; " because it was given, not for injury, but for safety; for let us not suppose that God makes anything useless or hurtful.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FFrom%2520the%2520Discourse%2520on%2520the%2520Resurrection.html"
source_title="From the Discourse on the Resurrection"
