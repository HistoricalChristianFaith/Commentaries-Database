[[commentary]]
quote='''
Oh, concordant harmony, composed by the Divine Spirit! Oh, the comeliness of those who sing of the mysteries of God! Oh, that I also may join in these songs in my prayer. Let us then also sing the like song, and raise the hymn to the Holy Father, glorifying in the Spirit Jesus, who is in His bosom.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FConcerning%2520Free-Will.html"
source_title="Methodius Concerning Free-Will"

[[commentary]]
quote='''
Therefore God alone is celebrated, as the unbegotten, independent, and unwearied nature; being incorporeal, and therefore invisible; for "no man hath seen God." But souls, being rational bodies, are arranged by the Maker and Father of all things into members which are visible to reason, having received this impression.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FFrom%2520the%2520Discourse%2520on%2520the%2520Resurrection.html"
source_title="Methodius From the Discourse on the Resurrection"
