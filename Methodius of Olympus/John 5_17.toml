[[commentary]]
quote='''
Now the sentence and ordinance of God respecting the begetting of children is confessedly being fulfilled to this day, the Creator still fashioning man. For this is quite manifest, that God, like a painter, is at this very time working at the world, as the Lord also taught, "My Father worketh hitherto." But when the rivers shall cease to flow and fall into the reservoir of the sea, and the light shall be perfectly separated from the darkness,-for the separation is still going on,-and the dry land shall henceforth cease to bring forth its fruits with creeping things and four-footed beasts, and the predestined number of men shall be fulfilled; then from henceforth shall men abstain from the generation of children. But at present man must cooperate in the forming of the image of God, while the world exists and is still being formed; for it is said, "Increase and multiply."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FDiscourse%25202.-Theophila.html"
source_title="Methodius Discourse II. Theophila"

[[commentary]]
quote='''
The apostle certainly, after assigning the planting and watering to art and earth and water, conceded the growth to God alone, where he says, "Neither is he that planteth anything, neither he that watereth; but God that giveth the increase." For he knew that Wisdom, the first-born of God, the parent and artificer of all things, brings forth everything into the world; whom the ancients called Nature and Providence, because she, with constant provision and care, gives to all things birth and growth. "For," says the Wisdom of God, "my Father worketh hitherto, and I work." Now it is on this account that Solomon called Wisdom the artificer of all things, since God is in no respect poor, but able richly to create, and make, and vary, and increase all things.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FFrom%2520the%2520Discourse%2520on%2520the%2520Resurrection.html"
source_title="Methodius From the Discourse on the Resurrection"
