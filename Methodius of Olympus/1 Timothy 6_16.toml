[[commentary]]
quote='''
We have all come into this world, O virgins, endowed with singular beauty, which has a relationship and affinity to divine wisdom. For the souls of men do then most accurately resemble Him who begat and formed them, when, reflecting the unsullied representation of His likeness, and the features of that countenance, to which God looking formed them to have an immortal and indestructible shape, they remain such. For the unbegotten and incorporeal beauty, which neither begins nor is corruptible, but is unchangeable, and grows not old and has need of nothing, He resting in Himself, and in the very light which is in unspeakable and inapproachable places, embracing all things in the circumference of His power, creating and arranging, made the soul after the image of His image. Therefore, also, it is reasonable and immortal.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FDiscourse%25206.-Agathe.html'
source_title="THE BANQUET OF THE TEN VIRGINS 6.1"
