[[commentary]]
quote='''
And in addition to this, when besides the spectacle, and even beyond the spectacle, they heard an old man, very righteous, very worthy of credit, worthy also of emulation, inspired by the Holy Spirit, a teacher of the law, honoured with the priesthood, illustrious in the gift of prophecy, by the hope which he had conceived of Christ, extending the limits of life, and putting off the debt of death—when they saw him, I say, leaping for joy, speaking words of good omen, quite transformed with gladness of heart, entirely rapt in a divine and holy ecstasy; who from a man had been changed into an angel by a godly change, and, for the immensity of his joy, chanted his hymn of thanksgiving, and openly proclaimed the "Light to lighten the Gentiles, and the glory of Thy people Israel."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520Concerning%2520Simeon%2520and%2520Anna.html"
source_title="Methodius Oration Concerning Simeon and Anna"
