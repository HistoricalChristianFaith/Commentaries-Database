[[commentary]]
quote='''
Hail to thee, thou Catholic Church, which hast been planted in all the earth, and do thou rejoice with us. Fear not, little flock, the storms of the enemy; for it is your Father's good pleasure to give you the kingdom, and that you should tread upon the necks of your enemies. Hail, and rejoice, thou that wast once barren, and without seed unto godliness, but who hast now many children of faith. Hail, thou people of the Lord, thou chosen generation, thou royal priesthood, thou holy nation, thou peculiar people -- show forth His praises who hath called you out of darkness into His marvellous light; and for His mercies glorify Him.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520Concerning%2520Simeon%2520and%2520Anna.html"
source_title="Methodius Oration Concerning Simeon and Anna"
