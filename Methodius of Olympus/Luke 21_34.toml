[[commentary]]
quote='''
And therefore it is ordered that a virgin shall not taste of this vine, so that she may be sober and watchful from the cares of life, and may kindle the shining torch of the light of righteousness for the Word. "Take heed to yourselves," says the Lord, "lest at any time your hearts be overcharged with surfeiting, and drunkenness, and cares of this life, and so that day come upon you unawares, as a snare."
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FDiscourse%25205.-Thallousa.html"
source_title="Methodius Discourse V. Thallousa"
