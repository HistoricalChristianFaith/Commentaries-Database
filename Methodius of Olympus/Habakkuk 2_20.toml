[[commentary]]
quote='''
And then, as to that which is subjoined, "When the time is come, Thou shalt be shown forth," what exposition doth this require, if a man diligently direct the eye of his mind to the festival which we are now celebrating? "For then shalt Thou be shown forth," He says, "as upon a kingly charger, by Thy pure and chaste mother, in the temple, and that in the grace and beauty of the flesh assumed by Thee." All these things the prophet, summing up for the sake of greater clearness, exclaims in brief: "The Lord is in His holy temple;" "Fear before Him all the earth."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520Concerning%2520Simeon%2520and%2520Anna.html'
source_title="ORATION CONCERNING SIMEON AND ANNA 4"
