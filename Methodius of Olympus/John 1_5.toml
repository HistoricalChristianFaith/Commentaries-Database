[[commentary]]
quote='''
They ungratefully and malignantly ask, Who is this? as if they had never yet seen their Benefactor, and Him whom divine miracles, beyond the power of man, had made famous and renowned; for the darkness comprehended not that unsetting light which shone in upon it. Hence quite appositely with respect to them hath the prophet Isaiah exclaimed, saying, Hear, ye deaf; and look, ye blind, that ye may see. And who is blind, but my children? and deaf, but they that have the dominion over them? And the servants of the Lord have become blind; ye have often seen, but ye observed not; your ears are opened, yet ye hear not.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520on%2520the%2520Psalms.html"
source_title="Methodius Oration on the Psalms"
