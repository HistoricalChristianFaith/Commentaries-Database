[[commentary]]
quote='''
So far we have given, in brief, the history of the woman and the dragon. But to search out and explain the solution of them is beyond my powers. Nevertheless, let me venture, trusting in Him who commanded to search the Scriptures. If, then, you agree with this, it will not be difficult to undertake it; for you will quite pardon me, if I am unable sufficiently to explain the exact meaning of the Scripture.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FDiscourse%25208.-Thekla.html"
source_title="Methodius Discourse VIII. Thekla"

[[commentary]]
quote='''
Learn the mysteries of God; the very thing itself which is being done bears witness that it is God that is thus hymned by uninstructed tongues. Search the Scriptures, as ye have heard from the Lord; for they are they which testify of Him, and be not ignorant of this miracle. Hear ye men without grace, and thankless, what good tidings the prophet Zechariah brings to you. He says, Rejoice greatly, O daughter of Zion; behold thy King cometh unto thee: just and having salvation; lowly, and riding upon the foal of an ass. Why do ye repel the joy? Why, when the sun shineth, do ye love darkness? Why do ye against unconquerable peace meditate war?
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520on%2520the%2520Psalms.html"
source_title="Methodius Oration on the Psalms"
