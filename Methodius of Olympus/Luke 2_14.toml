[[commentary]]
quote='''
Tremendous, verily, is the mystery connected with thee, O virgin mother, thou spiritual throne, glorified and made worthy of God. Thou hast brought forth, before the eyes of those in heaven and earth, a pre-eminent wonder. And it is a proof of this, and an irrefragable argument, that at the novelty of thy supernatural child-bearing, the angels sang on earth, "Glory to God in the highest, and on earth peace, good-will towards men," by their threefold song bringing in a threefold holiness.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520Concerning%2520Simeon%2520and%2520Anna.html"
source_title="Methodius Oration Concerning Simeon and Anna"
