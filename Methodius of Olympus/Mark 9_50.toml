[[commentary]]
quote='''
For as the putrid humours and matter of flesh, and all those things which corrupt it, are driven out by salt, in the same manner all the irrational appetites of a virgin are banished from the body by divine teaching. For it must needs be that the soul which is not sprinkled with the words of Christ, as with salt, should stink and breed worms, as King David, openly confessing with tears in the mountains, cried out, "My wounds stink and are corrupt," because he had not salted himself with the exercises of self-control, and so subdued his carnal appetites, but self-indulgently had yielded to them, and became corrupted in adultery. And hence, in Leviticus, every gift, unless it be seasoned with salt, is forbidden to be offered as an oblation to the Lord God. Now the whole spiritual meditation of the Scriptures is given to us as salt which stings in order to benefit, and which disinfects, without which it is impossible for a soul, by means of reason, to be brought to the Almighty; for "ye are the salt of the earth," said the Lord to the apostles.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FDiscourse%25201.-Marcella.html'
source_title="THE BANQUET OF THE TEN VIRGINS 1.1"
