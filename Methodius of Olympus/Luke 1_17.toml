[[commentary]]
quote='''
In order that by the miracle of these the hearts of the fathers might be turned to the children, and the disobedient unto the wisdom of the just.
...
O ye disobedient as regards the wisdom of the just, turn your hearts to your children. Learn the mysteries of God; the very thing itself which is being done bears witness that it is God that is thus hymned by uninstructed tongues. Search the Scriptures, as ye have heard from the Lord; for they are they which testify of Him, and be not ignorant of this miracle. Hear ye men without grace, and thankless, what good tidings the prophet Zechariah brings to you. He says, Rejoice greatly, O daughter of Zion; behold thy King cometh unto thee: just and having salvation; lowly, and riding upon the foal of an ass. Why do ye repel the joy? Why, when the sun shineth, do ye love darkness? Why do ye against unconquerable peace meditate war? If, therefore, ye be the sons of Zion, join in the dance together with your children. Let the religious service of your children be to you a pretext for joy. Learn from them who was their Teacher; who called them together; whence was the doctrine; what means this new theology and old prophecy. And if no man hath taught them this, but of their own accord they raise the hymn of praise, then recognise the work of God, even as it is written in the law: "Out of the mouth of babes and sucklings hast Thou perfected praise." Redouble, therefore, your joy, that you have been made the fathers of such children who, under the teaching of God, have celebrated with their praises things unknown to their seniors. Turn your hearts to your children, and close not your eyes against the truth. But if you remain the same, and hearing, hear not, and seeing, perceive not, and to no purpose dissent from your children, then shall they be your judges according to the Saviour's word.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520on%2520the%2520Psalms.html"
source_title="Methodius Oration on the Psalms"
