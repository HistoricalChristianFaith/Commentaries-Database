[[commentary]]
quote='''
For these thankless men saw, and by means of His miracles handled the wonder-working God, and yet remained in unbelief. ... They heard of the wine that, without previous culture, was ministered; of the bread that was eaten at that spontaneous banquet; they heard that the demons had been put to flight; the sick restored to health.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520on%2520the%2520Psalms.html"
source_title="Methodius Oration on the Psalms"
