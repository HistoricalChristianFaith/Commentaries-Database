[[commentary]]
quote='''
For the mind being cleansed by laborious exercises from the distracting thoughts which darken it, quickly perceives the truth; as the widow in the Gospels found the piece of money after she had swept the house and cast out the dirt, that is, the passions which obscure and cloud the mind, which increase in us from our luxuriousness and carelessness.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FDiscourse%25209.-Tusiane.html"
source_title="Methodius Discourse IX. Tusiane"
