[[commentary]]
quote='''
And there may be a doubt concerning Lazarus and the rich man. The simpler persons think that these things were spoken as though both were receiving their due for the things which they had done in life in their bodies; but the more accurate think that, since no one is left in life after the resurrection, these things do not happen at the resurrection. For the rich man says: "I have five brethren; ... lest they also come into this place of torment, " send Lazarus, that he may tell them of those things which are here.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FFrom%2520the%2520Discourse%2520on%2520the%2520Resurrection.html"
source_title="Methodius From the Discourse on the Resurrection"
