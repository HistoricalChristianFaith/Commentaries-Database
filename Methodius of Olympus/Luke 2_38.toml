[[commentary]]
quote='''
When, then, to these sacred rites, prophecy and the priesthood had been jointly called, and that pair of just ones elected of God—Simeon, I mean, and Anna, bearing in themselves most evidently the images of both peoples—had taken their station by the side of that glorious and virginal throne,—for by the old man was represented the people of Israel, and the law now waxing old; whilst the widow represents the Church of the Gentiles, which had been up to this point a widow,—the old man, indeed, as personating the law, seeks dismissal; but the widow, as personating the Church, brought her joyous confession of faith and spake of Him to all that looked for redemption in Jerusalem, even as the things that were spoken of both have been appositely and excellently recorded, and quite in harmony with the sacred festival. For it was fitting and necessary that the old man who knew so accurately that decree of the law, in which it is said: Hear Him, and every soul that will not hearken unto Him shall be cut off from His people, should seek a peaceful discharge from the tutorship of the law; for in truth it were insolence and presumption, when the king is present and addressing the people, for one of his attendants to make a speech over against him, and that to this man his subjects should incline their ears. It was necessary, too, that the widow who had been increased with gifts beyond measure, should in festal strains return her thanks to God; and so the things which there took place were agreeable to the law.
'''
source_url="https://historicalchristian.faith/by_father.php?file=Methodius%2520of%2520Olympus%2FOration%2520Concerning%2520Simeon%2520and%2520Anna.html"
source_title="Methodius Oration Concerning Simeon and Anna"
