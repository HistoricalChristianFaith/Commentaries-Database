[[commentary]]
quote='''
Do not admit less evidence to convict any one than that of three witnesses, and those of known and established reputation; inquire whether they do not accuse out of ill-will or envy: for there are many that delight in mischief, forward in discourse, slanderous, haters of the brethren, making it their business to scatter the sheep of Christ; whose affirmation if thou admittest without nice scanning the same, thou wilt disperse thy flock, and betray it to be devoured by wolves, that is, by demons and wicked men, or rather not men, but wild beasts in the shape of men—by the heathen, by the Jews, and by the atheistic heretics. For those destroying wolves soon address themselves to any one that is cast out of the Church, and esteem him as a lamb delivered for them to devour, reckoning his destruction their own gain. For he that is "their father, the devil, is a murderer." He also who is separated unjustly by thy want of care in judging will be overwhelmed with sorrow, and be disconsolate, and so will either wander over to the heathen, or be entangled in heresies, and so will be altogether estranged from the Church and from hope in God, and will be entangled in impiety, whereby thou wilt be guilty of his perdition: for it is not fair to be too hasty in casting out an offender, but slow in receiving him when he returns; to be forward in cutting off, but unmerciful when he is sorrowful, and ought to be healed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25202.html'
source_title="Constitutions of the Holy Apostles Book 2"
