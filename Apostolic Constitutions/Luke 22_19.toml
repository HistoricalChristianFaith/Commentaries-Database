[[commentary]]
quote='''
For this reason do you also, now the Lord is risen, offer your sacrifice, concerning which He made a constitution by us, saying, "Do this for a remembrance of me;" and thenceforward leave off your fasting, and rejoice, and keep a festival, because Jesus Christ, the pledge of our resurrection, is risen from the dead. And let this be an everlasting ordinance till the consummation of the world, until the Lord come. For to Jews the Lord is still dead, but to Christians He is risen: to the former, by their unbelief; to the latter, by their full assurance of faith. For the hope in Him is immortal and eternal life.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25205.html'
source_title="Constitutions of the Holy Apostles Book 5"
