[[commentary]]
quote='''
Let him who lays his hands upon him adore God, the Lord of the whole world, and thank Him for His creation, for His sending Christ His only begotten Son, that He might save man by blotting out his transgressions, and that He might remit ungodliness and sins, and might "purify him from all filthiness of flesh and spirit," and sanctify man according to the good pleasure of His kindness, that He might inspire him with the knowledge of His will, and enlighten the eyes of his heart to consider of His wonderful works, and make known to him the judgments of righteousness, that so he might hate every way of iniquity, and walk in the way of truth, that he might be thought worthy of the layer of regeneration, to the adoption of sons, which is in Christ, that "being planted together in the likeness of the death of Christ," in hopes of a glorious communication, he may be mortified to sin, and may live to God, as to his mind, and word, and deed, and may be numbered together in the book of the living.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25207.html'
source_title="Constitutions of the Holy Apostles Book 7"
