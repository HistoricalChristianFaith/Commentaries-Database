[[commentary]]
quote='''
He that framed for Himself a body out of a virgin, is also the Former of other men. And He that raised Himself from the dead, will also raise again all that are laid down. He who raises wheat out of the ground with many stalks from one grain, He that made the tree that is cut down send forth fresh branches, He that made Aaron's dry rod put forth buds, will raise us up in glory; He that raised Him up that had the palsy whole, and healed him that had the withered hand, He that supplied a defective part to him that was born blind from clay and spittle, will raise us up; He that satisfied five thousand men with five loaves and two fishes, and caused a remainder of twelve baskets, and out of water made wine, and sent a piece of money out of a fish's mouth by me Peter to those that demanded tribute, will raise the dead.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25205.html'
source_title="Constitutions of the Holy Apostles Book 5"
