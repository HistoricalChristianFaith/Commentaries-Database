[[commentary]]
quote='''
Let him that offers himself to baptism learn these and the like things during the time that he is a catechumen; and let him who lays his hands upon him adore God, the Lord of the whole world, and thank Him for His creation, for His sending Christ His only begotten Son, that He might save man by blotting out his transgressions, and that He might remit ungodliness and sins, and might "purify him from all filthiness of flesh and spirit," and sanctify man according to the good pleasure of His kindness, that He might inspire him with the knowledge of His will, and enlighten the eyes of his heart to consider of His wonderful works, and make known to him the judgments of righteousness, that so he might hate every way of iniquity, and walk in the way of truth, that he might be thought worthy of the layer of regeneration, to the adoption of sons, which is in Christ, that "being planted together in the likeness of the death of Christ," in hopes of a glorious communication, he may be mortified to sin, and may live to God, as to his mind, and word, and deed, and may be numbered together in the book of the living.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25207.html'
source_title="Constitutions of the Holy Apostles Book 7"

[[commentary]]
quote='''
Let us all pray unto God for the catechumens, that He that is good, He that is the lover of mankind, will mercifully hear their prayers and their supplications, and so accept their petitions as to assist them and give them those desires of their hearts which are for their advantage, and reveal to them the Gospel of His Christ; give them illumination and understanding, instruct them in the knowledge of God, teach them His commands and His ordinances, implant in them His pure and saving fear, open the ears of their hearts, that they may exercise themselves in His law day and night; strengthen them in piety, unite them to and number them with His holy flock; vouchsafe them the layer of regeneration, and the garment of incorruption, which is the true life; and deliver them from all ungodliness, and give no place to the adversary against them; "and cleanse them from all filthiness of flesh and spirit, and dwell in them, and walk in them, by His Christ; bless their goings out and their comings in, and order their affairs for their good."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25208.html'
source_title="Constitutions of the Holy Apostles Book 8"

[[commentary]]
quote='''
Let us all earnestly pray for our brethren in the state of penitence, that God, the lover of compassion, will show them the way of repentance, and accept their return and their confession, and bruise Satan under their feet suddenly, and redeem them from the snare of the devil, and the ill-usage of the demons, and free them from every unlawful word, and every absurd practice and wicked thought; forgive them all their offences, both voluntary and involuntary, and blot out that handwriting which is against them, and write them in the book of life; cleanse them from all filthiness of flesh and spirit, and restore and unite them to His holy flock. For He knoweth our frame. For who can glory that he has a clean heart? And who can boldly say, that he is pure from sin?
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25208.html'
source_title="Constitutions of the Holy Apostles Book 8"

[[commentary]]
quote='''
O God, who art great, and whose name is great, who art great in counsel and mighty in works, the God and Father of Thy holy child Jesus, our Saviour; look down upon us, and upon this Thy flock, which Thou hast chosen by Him to the glory of Thy name; and sanctify our body and soul, and grant us the favour to be "made pure from all filthiness of flesh and spirit," and may obtain the good things laid up for us, and do not account any of us unworthy; but be Thou our comforter, helper, and protector, through Thy Christ, with whom glory, honour, praise, doxology, and thanksgiving be to Thee and to the Holy Spirit for ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25208.html'
source_title="Constitutions of the Holy Apostles Book 8"

[[commentary]]
quote='''
O Eternal God, the Father of our Lord Jesus Christ, the Creator of man and of woman, who didst replenish with the Spirit Miriam, and Deborah, and Anna, and Huldah; who didst not disdain that Thy only begotten Son should be born of a woman; who also in the tabernacle of the testimony, and in the temple, didst ordain women to be keepers of Thy holy gates,-do Thou now also look down upon this Thy servant, who is to be ordained to the office of a deaconess, and grant her Thy Holy Spirit, and "cleanse her from all filthiness of flesh and spirit," that she may worthily discharge the work which is committed to her to Thy glory, and the praise of Thy Christ, with whom glory and adoration be to Thee and the Holy Spirit for ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25208.html'
source_title="Constitutions of the Holy Apostles Book 8"
