[[commentary]]
quote='''
Since thou art therefore a physician of the Lord's Church, provide remedies suitable to every patient's case. Cure them, heal them by all means possible; restore them sound to the Church. Feed the flock, "not with insolence and contempt, as lording it over them," but as a gentle shepherd, "gathering the lambs into thy bosom, and gently leading those which are with young."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25202.html'
source_title="Constitutions of the Holy Apostles Book 2"

[[commentary]]
quote='''
For by thee does our Saviour say to him who is discouraged under the sense of his sins, "Thy sins are forgiven thee: thy faith hath saved thee; go in peace." But this peace and haven of tranquillity is the Church of Christ, into which do thou, when thou hast loosed them from their sins, restore them, as being now sound and unblameable, of good hope, diligent, laborious in good works.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25202.html'
source_title="Constitutions of the Holy Apostles Book 2"
