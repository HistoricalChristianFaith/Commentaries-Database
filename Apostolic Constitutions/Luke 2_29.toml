[[commentary]]
quote='''
"Ye children, praise the Lord: praise the name of the Lord." We praise Thee, we sing hymns to Thee, we bless Thee for Thy great glory, O Lord our King, the Father of Christ the immaculate Lamb, who taketh away the sin of the world. Praise becomes Thee, hymns become Thee, glory becomes Thee, the God and Father, through the Son, in the most holy Spirit, for ever and ever. Amen. "Now, O Lord, lettest Thou Thy servant depart in peace, according to Thy word; for mine eyes have seen Thy salvation, which Thou hast prepared before the face of all people, a light for the revelation to the Gentiles, and the glory of Thy people Israel."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25207.html'
source_title="Constitutions of the Holy Apostles Book 7"
