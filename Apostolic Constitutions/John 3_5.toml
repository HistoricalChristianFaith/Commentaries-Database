[[commentary]]
quote='''
Nay, he that, out of contempt, will not be baptized, shall be condemned as an unbeliever, and shall be reproached as ungrateful and foolish. For the Lord says: "Except a man be baptized of water and of the Spirit, he shall by no means enter into the kingdom of heaven." And again: "He that believeth and is baptized shall be saved; but he that believeth not shall be damned." But he that says, When I am dying I will be baptized, lest I should sin and defile my baptism, is ignorant of God, and forgetful of his own nature. For "do not thou delay to turn unto the Lord, for thou knowest not what the next day will bring forth." Do you also baptize your infants, and bring them up in the nurture and admonition of God. For says He: "Suffer the little children to come unto me, and forbid them not."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25206.html'
source_title="Constitutions of the Holy Apostles Book 6"
