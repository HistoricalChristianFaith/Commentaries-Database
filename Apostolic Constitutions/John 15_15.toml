[[commentary]]
quote='''
"But blessed are your eyes, for they see; and your ears, for they hear." Yours, I say, who have believed in the one God, not by necessity, but by a sound understanding, in obedience to Him that called you. For you are released from the bonds, and freed from the servitude. For says He: "I call you no longer servants, but friends; for all things that I have heard of my Father have I made known unto you." For to them that would not see nor hear, not for the want of those senses, but for the excess of their wickedness, "I gave statutes that were not good, and judgments whereby they would not live;" they are looked upon as not good, as burnings and a sword, and medicines are esteemed enemies by the sick, and impossible to be observed on account of their obstinacy: whence also they brought death upon them being not obeyed.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25206.html'
source_title="Constitutions of the Holy Apostles Book 6"
