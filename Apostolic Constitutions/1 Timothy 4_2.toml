[[commentary]]
quote='''
If any bishop, or presbyter, or deacon does not on festival days partake of flesh or wine, let him be deprived, as "having a seared conscience," and becoming a cause of scandal to many.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FThe%2520Ecclesiastical%2520Canons%2520of%2520the%2520Same%2520Holy%2520Apostles.html'
source_title="The Ecclesiastical Canons of the Same Holy Apostles"
