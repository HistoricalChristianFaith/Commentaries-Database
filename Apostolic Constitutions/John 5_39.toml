[[commentary]]
quote='''
Let him he patient and gentle in his admonitions, well instructed himself, meditating in and diligently studying the Lord's books, and reading them frequently, that so he may be able carefully to interpret the Scriptures, expounding the Gospel in correspondence with the prophets and with the law; and let the expositions from the law and the prophets correspond to the Gospel. For the Lord Jesus says: "Search the Scriptures; for they are those which testify of me." And again: "For Moses wrote of me." But, above all, let him carefully distinguish between the original law and the additional precepts, and show which are the laws for believers, and which the bonds for the unbelievers, lest any should fall under those bonds. Be careful, therefore, O bishop, to study the word, that thou mayest be able to explain everything exactly, and that thou mayest copiously nourish thy people with much doctrine, and enlighten them with the light of the law; for God says: "Enlighten yourselves with the light of knowledge, while we have yet opportunity."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25202.html'
source_title="Constitutions of the Holy Apostles Book 2"
