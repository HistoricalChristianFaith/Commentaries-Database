[[commentary]]
quote='''
Ezekiel also, and the following prophets, affirm everywhere that He is the Christ, the Lord, the King, the Judge, the Lawgiver, the Angel of the Father, the only-begotten God. Him therefore do we also preach to you, and declare Him to be God the Word, who ministered to His God and Father for the creation of the universe. By believing in Him you shall live, but by disbelieving you shall be punished. For "he that is disobedient to the Son shall not see life, but the wrath of God abideth on him."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25205.html'
source_title="Constitutions of the Holy Apostles Book 5"
