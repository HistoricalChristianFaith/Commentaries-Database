[[commentary]]
quote='''
But because this heresy did then seem the more powerful to seduce men, and the whole Church was in danger, we the twelve assembled together at Jerusalem (for Matthias was chosen to be an apostle in the room of the betrayer, and took the lot of Judas; as it is said, "His bishopric let another take"). We deliberated, together with James the Lord's brother, what was to be done; and it seemed good to him and to the elders to speak to the people words of doctrine. For certain men likewise went down from Judea to Antioch, and taught the brethren who were there, saying: "Unless ye be circumcised after the manner of Moses, and walk according to the other customs which he ordained, ye cannot be saved." When, therefore, there had been no small dissension and disputation, the brethren which were at Antioch, when they knew that we were all met together about this question, sent out unto us men who were faithful and understanding in the Scriptures to learn concerning this question.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25206.html'
source_title="Constitutions of the Holy Apostles Book 6"
