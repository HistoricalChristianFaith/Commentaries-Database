[[commentary]]
quote='''
But if any younger woman, who has lived but a while with her husband, and has lost him by death or some other occasion, and remains by herself, having the gift of widowhood, she will be found to be blessed, and to be like the widow of Sarepta, belonging to Sidon, with whom the holy prophet of God, Elijah, lodged. Such a one may also be compared to "Anna, the daughter of Phanuel, of the tribe of Aser, which departed not from the temple, but continued in supplications and prayers night and day, who was fourscore years old, and had lived with an husband seven years from her virginity, who glorified the coming of Christ, and gave thanks to the Lord, and spake concerning Him to all those who looked for redemption in Israel." Such a widow will have a good report, and will be honoured, having both glory with men upon earth, and eternal praise with God in heaven.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25203.html'
source_title="Constitutions of the Holy Apostles Book 3"

[[commentary]]
quote='''
O Eternal God, the Father of our Lord Jesus Christ, the Creator of man and of woman, who didst replenish with the Spirit Miriam, and Deborah, and Anna, and Huldah; who didst not disdain that Thy only begotten Son should be born of a woman; who also in the tabernacle of the testimony, and in the temple, didst ordain women to be keepers of Thy holy gates,-do Thou now also look down upon this Thy servant, who is to be ordained to the office of a deaconess, and grant her Thy Holy Spirit, and "cleanse her from all filthiness of flesh and spirit," that she may worthily discharge the work which is committed to her to Thy glory, and the praise of Thy Christ, with whom glory and adoration be to Thee and the Holy Spirit for ever. Amen.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25208.html'
source_title="Constitutions of the Holy Apostles Book 8"
