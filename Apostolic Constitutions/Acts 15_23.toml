[[commentary]]
quote='''
Then it seemed good to us the apostles, and to James the bishop, and to the elders, with the whole Church, to send men chosen from among our own selves, with Barnabas, and Paul of Tarsus, the apostle of the Gentiles, and Judas who was called Barsabbas, and Silas, chief men among the brethren, and wrote by their hand, as follows: "The apostles, and elders, and brethren, to the brethren of Antioch, Syria, and Cilicia of the Gentiles, send greeting: Since we have heard that some from us have troubled you with words, subverting your souls, to whom we gave no such commandment, it has seemed good to us, when we were met together with one accord, to send chosen men to you, with our beloved Barnabas and Paul, men that have hazarded their lives for our Lord Jesus Christ, by whom ye sent unto us. We have sent also with them Judas and Silas, who shall themselves declare the same things by mouth. For it seemed good to the Holy Ghost, and to us, to lay no other burden upon you than these necessary things; that ye abstain from things offered to idols, and from blood, and from things strangled, and from fornication: from which things if ye keep yourselves, ye shall do well. Fare ye well."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25206.html'
source_title="Constitutions of the Holy Apostles Book 6"
