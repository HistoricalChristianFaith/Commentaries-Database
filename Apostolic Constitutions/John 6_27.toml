[[commentary]]
quote='''
But if any one allege the pretence of his own work, and so is a despiser, "offering pretences for his sins," let such a one know that the trades of the faithful are works by the by, but the worship of God is their great work. Follow therefore your trades as by the by, for your maintenance, but make the worship of God your main business; as also our Lord said: "Labour not for the meat which perishes, but for that which endureth unto everlasting life."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25202.html'
source_title="Constitutions of the Holy Apostles Book 2"
