[[commentary]]
quote='''
By whom also we exhort you in the Lord to abstain from your old conversation, vain bonds, separations, observances, distinction of meats, and daily washings: for "old things are passed away; behold, all things are become new."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25206.html'
source_title="Constitutions of the Holy Apostles Book 6"
