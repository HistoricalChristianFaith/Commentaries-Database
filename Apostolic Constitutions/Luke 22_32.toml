[[commentary]]
quote='''
For indeed he opposed that great high priest Joshua the son of Josedek; and he oftentimes sought to sift us, that our faith might fail. But our Lord and Master, having brought him to trial, said unto him: "The Lord rebuke thee, O devil; and the Lord, who hath chosen Jerusalem, rebuke thee. Is not this plucked out of the fire as a brand?" And who said then to those that stood by the high priest, "Take away his ragged garments from him;" and added, "Behold, I have taken thine iniquities away from thee;" He will say now, as He said formerly of us when we were assembled together, "I have prayed that your faith may not fail."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25206.html'
source_title="Constitutions of the Holy Apostles Book 6"
