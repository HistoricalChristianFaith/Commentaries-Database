[[commentary]]
quote='''
Jesus Christ, our God and Saviour, delivered to us the great mystery of godliness, and called both Jews and Gentiles to the acknowledgment of the one and only true God His Father, as Himself somewhere says, when He was giving thanks for the salvation of those that had believed, "I have manifested Thy name to men, I have finished the work Thou gavest me;" and said concerning us to His Father, "Holy Father, although the world has not known Thee, yet have I known Thee; and these have known Thee."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25208.html'
source_title="Constitutions of the Holy Apostles Book 8"

[[commentary]]
quote='''
He lived holily, and taught according to the law; He drove away every sickness and every disease from men, and wrought signs and wonders among the people; and He was partaker of meat, and drink, and sleep, who nourishes all that stand in need of food, and "fills every living creature with His goodness;" "He manifested His name to those that knew it not;" He drave away ignorance; He revived piety, and fulfilled Thy will; He finished the work which Thou gavest Him to do...
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25208.html'
source_title="Constitutions of the Holy Apostles Book 8"
