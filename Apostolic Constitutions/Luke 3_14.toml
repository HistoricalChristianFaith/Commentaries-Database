[[commentary]]
quote='''
If a soldier come, let him be taught to "do no injustice, to accuse no man falsely, and to be content with his allotted wages:" if he submit to those rules, let him be received; but if he refuse them, let him be rejected.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25208.html'
source_title="Constitutions of the Holy Apostles Book 8"
