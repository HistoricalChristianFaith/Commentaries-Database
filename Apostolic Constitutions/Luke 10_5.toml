[[commentary]]
quote='''
But the Lord says: "When ye enter into an house, say, Peace be to this house. And if the son of peace be there, your peace shall rest upon it; but if it be not worthy, your peace shall return to you."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25203.html'
source_title="Constitutions of the Holy Apostles Book 3"
