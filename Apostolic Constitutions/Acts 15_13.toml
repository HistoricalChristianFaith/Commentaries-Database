[[commentary]]
quote='''
But James the Lord's brother answered and said: "Men and brethren, hearken unto me; Simeon hath declared how God at first visited to take out a people from the Gentiles for His name. And to this agree the words of the prophets; as it is written: 'Afterwards I will return, and will raise again and rebuild the tabernacle of David, which is fallen down; and I will rebuild its ruins, and will again set it up, that the residue of men may seek after the Lord, and all the nations upon whom my name is called, saith the Lord, who doth these things.' Known unto God are all His works from the beginning of the world. Wherefore my sentence is, that we do not trouble those who from among the Gentiles turn unto God: but to charge them that they abstain from the pollutions of the Gentiles, and from what is sacrificed to idols, and from blood, and from things strangled, and from fornication; which laws were given to the ancients who lived before the law, under the law of nature, Enos, Enoch, Noah, Melchizedek, Job, and if there be any other of the same sort."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Apostolic%2520Constitutions%2FConstitutions%2520of%2520the%2520Holy%2520Apostles%2520Book%25206.html'
source_title="Constitutions of the Holy Apostles Book 6"
