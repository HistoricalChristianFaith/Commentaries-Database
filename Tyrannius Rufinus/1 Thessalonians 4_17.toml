[[commentary]]
quote='''
That the righteous shall ever abide with Christ our Lord we have proved above, where we have shewn that the Apostle says, "Then we which are alive and remain shall be caught up together with them in the clouds to meet Christ in the air, and so shall we ever be with the Lord." And do not marvel that the flesh of the saints is to be changed into such a glorious condition at the resurrection as to be caught up to meet God, suspended in the clouds and borne in the air, since the same Apostle, setting forth the great things which God bestows on them that love Him, says, "Who shall change our vile body that it may be made like unto His glorious body." It is nowise absurd then, if the bodies of the saints are said to be raised up into the air, seeing that they are said to be renewed after the image of Christ's body, which is seated at God's right hand. But this also the holy Apostle adds, speaking either of himself or of others of his own place or merit, "He will raise us up together with Christ and make us sit together in the heavenly places."
'''
source_url='https://historicalchristian.faith/by_father.php?file=Tyrannius%2520Rufinus%2FA%2520Commentary%2520on%2520the%2520Apostles%2527%2520Creed.html'
source_title="A COMMENTARY ON THE APOSTLES' CREED 46"
