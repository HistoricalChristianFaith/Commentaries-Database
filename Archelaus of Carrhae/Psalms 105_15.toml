[[commentary]]
quote='''
But after Moses had made his appearance, and had given the law to the children of Israel, and had brought into their memory all the requirements of the law, and all that it behoved men to observe and do under it, and when he delivered over to death only those who should transgress the law, then death was cut off from reigning over all men; for it reigned then over sinners alone, as the law said to it, "Touch not those that keep my precepts." Moses therefore served the ministration of this word upon death, while he delivered up to destruction all others who were transgressors of the law; for it was not with the intent that death might not reign in any territory at all that Moses came, inasmuch as multitudes were assuredly held under the power of death even after Moses. And the law was called a "ministration of death" from the fact that then only transgressors of the law were punished, and not those who kept it, and who obeyed and observed the things which are in the law, as Abel did, whom Cain, who was made a vessel of the wicked one, slew. However, even after these things death wished to break the covenant which had been made by the instrumentality of Moses, and to reign again over the righteous; and with this object it did indeed assail the prophets, killing and stoning those who had been sent by God, on to Zacharias. But my Lord Jesus, as maintaining the righteousness of the law of Moses, was wroth with death for its transgression of the covenant and of that whole ministration, and condescended to appear in the body of man, with the view of avenging not Himself, but Moses, and those who in a continuous succession after him had been oppressed by the violence of death. That wicked one, however, in ignorance of the meaning of a dispensation of this kind, entered into Judas, thinking to slay Him by that man's means, as before he had put righteous Abel to death. But when he had entered into Judas, he was overcome with penitence, and hanged himself; for which reason also the divine word says: "O death, where is thy victory? O death, where is thy sting?" And again: "Death is swallowed up of victory." It is for this reason, therefore, that the law is called a "ministration of death" because it delivered sinners and transgressors over to death; but those who observed it, it defended from death; and these it also established in glory, by the help and aid of our Lord Jesus Christ.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Archelaus%2520of%2520Carrhae%2FThe%2520Acts%2520of%2520the%2520Disputation%2520with%2520the%2520Heresiarch%2520Manes.html'
source_title="THE ACTS OF THE DISPUTATION WITH THE HERESIARCH MANES 30"
