[[commentary]]
quote='''
Behold, did not Achar the son of Zata transgress in the accursed thing, and trouble then lighted on all the congregation of Israel? And this one man was alone in his sin; but he was not alone in the death that came by his sin. And by us, too, everything of a gainful kind at this time, which is ours not in our own rightful possession, but as property strictly belonging to others, ought to be reckoned a thing devoted. For that Achar indeed took of the spoil; and those men of the present time take also of the spoil. But he took what belonged to enemies; while these now take what belongs to brethren, and aggrandize themselves with fatal gains.
'''
source_url='https://historicalchristian.faith/by_father.php?file=Gregory%2520of%2520Neocaesarea%2FCanonical%2520Epistle.html'
source_title="CANONICAL EPISTLE 3"
